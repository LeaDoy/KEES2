name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  kustomize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
      - name: Build deploy/base
        run: kustomize build deploy/base > /dev/null
      - name: Build master-cluster overlays
        run: |
          set -e
          for d in \
            deploy/master-cluster/dc1-virginia/dev \
            deploy/master-cluster/dc1-virginia/staging \
            deploy/master-cluster/dc1-virginia/prod \
            deploy/master-cluster/dc2-texas/dev \
            deploy/master-cluster/dc2-texas/staging \
            deploy/master-cluster/dc2-texas/prod; do
            echo "kustomize build $d"
            kustomize build "$d" > /dev/null
          done
      - name: Build phase overlays
        run: |
          set -e
          for d in deploy/phases/phase2 deploy/phases/phase3 deploy/phases/phase4 deploy/phases/phase5; do
            echo "kustomize build $d"
            kustomize build "$d" > /dev/null
          done
      - name: WO-3 — No floating latest in deploy/gitops
        run: bash scripts/validate-helm-no-latest.sh

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"
      - name: Package all modules
        run: mvn -B package -DskipTests -f pom.xml
