# WO-11 — Build and push secret-rotation-job image; replace REPLACE_IMAGE.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kees2-secret-rotation
  namespace: confluent
spec:
  schedule: "0 3 * * 0"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: svc-pipeline-runner
          containers:
            - name: rotate
              image: REPLACE_IMAGE/kees2-secret-rotation-job:1.0.0
              args:
                - --namespace
                - confluent
