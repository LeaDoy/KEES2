# WO-11 — ClusterSecretStore for Wells Fargo vault (HashiCorp Vault KV v2 pattern — adjust provider).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: wf-secret-store
spec:
  provider:
    vault:
      server: "https://REPLACE_VAULT_HOST"
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: kees2-eso
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
