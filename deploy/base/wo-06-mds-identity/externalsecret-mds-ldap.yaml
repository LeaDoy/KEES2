# WO-6 — LDAP bind for AD group sync into MDS.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mds-ldap-bind
  namespace: confluent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: wf-secret-store
    kind: ClusterSecretStore
  target:
    name: mds-ldap-bind
    creationPolicy: Owner
  data:
    - secretKey: bindPassword
      remoteRef:
        key: secret/data/kees2/mds/ldap
        property: bind_password
