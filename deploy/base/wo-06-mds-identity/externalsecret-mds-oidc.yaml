# WO-6 — OIDC client id/secret from enterprise vault (paths are placeholders).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mds-oidc-client
  namespace: confluent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: wf-secret-store
    kind: ClusterSecretStore
  target:
    name: mds-oidc-client
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: secret/data/kees2/mds/oidc
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: secret/data/kees2/mds/oidc
        property: client_secret
