# WO-2 — Stub CFK resources; align apiVersion/spec with your CFK operator version.
# Apply KRaftController before Kafka per Confluent docs.
---
apiVersion: platform.confluent.io/v1beta2
kind: KRaftController
metadata:
  name: kraft
  namespace: confluent
spec:
  replicas: 1
  podTemplate:
    podMetadata:
      labels:
        platform.kees2.io/managed: "true"
        platform.kees2.io/environment: dev
        platform.kees2.io/datacenter: dc1-virginia
  image:
    application: confluentinc/cp-server:7.6.0
  listeners:
    internal:
      tls:
        enabled: true
---
apiVersion: platform.confluent.io/v1beta2
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-server:7.6.0
  podTemplate:
    podMetadata:
      labels:
        platform.kees2.io/managed: "true"
        platform.kees2.io/environment: dev
        platform.kees2.io/datacenter: dc1-virginia
  listeners:
    internal:
      tls:
        enabled: true
