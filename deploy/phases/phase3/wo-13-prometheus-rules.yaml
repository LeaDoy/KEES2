# WO-13 — Mandatory alert rules (tune exprs to your JMX exporter metric names).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kees2-kafka-mandatory-alerts
  namespace: openshift-monitoring
spec:
  groups:
    - name: kees2-kafka
      rules:
        - alert: KafkaBrokerDown
          expr: absent(up{job=~".*kafka.*"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Kafka broker scrape target down"
        - alert: UnderReplicatedPartitions
          expr: kafka_server_replicamanager_underreplicatedpartitions > 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Under-replicated partitions detected"
        - alert: OfflinePartitions
          expr: kafka_controller_kafkacontroller_offlinepartitionscount > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Offline partitions"
        - alert: ConsumerLagHigh
          expr: kafka_consumergroup_lag > 10000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Consumer lag > 10000"
        - alert: BrokerDiskUsageHigh
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Broker volume usage > 80%"
