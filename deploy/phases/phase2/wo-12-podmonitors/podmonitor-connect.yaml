apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kees2-connect-jmx
  labels:
    release: prometheus
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      confluent.org/type: connect
  podMetricsEndpoints:
    - port: prometheus
      path: /metrics
      interval: 30s
      relabelings:
        - targetLabel: cluster
          replacement: connect
        - targetLabel: dataCenter
          replacement: REPLACE_DC_LABEL
