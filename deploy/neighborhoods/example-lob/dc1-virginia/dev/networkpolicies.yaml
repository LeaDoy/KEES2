# WO-19 — Default deny cross-neighborhood ingress; allow confluent namespace to 9071.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-neighborhood
  labels:
    platform.kees2.io/managed: "true"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-confluent-master
  labels:
    platform.kees2.io/managed: "true"
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: confluent
      ports:
        - port: 9071
          protocol: TCP
